<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCMC Premium Hotels - Price Board</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="board-container">
        <header>
            <h1>HCMC CENTER</h1>
            <h2>PREMIUM HOTELS & APARTMENTS</h2>
            <p class="subtitle-desc">HOTELS: STD DBL ROOM &nbsp;|&nbsp; APTS: 1BR &nbsp;|&nbsp; PRICE FOR 1 NIGHT</p>
        </header>

        <div class="board-header">
            <div class="col-name">PROPERTY</div>
            <div class="col-price">PRICE/NIGHT</div>
            <div class="col-trend">CHANGE</div>
            <div class="col-diff">VARIANCE</div>
        </div>

        <div id="board" class="board">
            <!-- Rows will be injected by script.js -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
